<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crivo — Entrar ou Cadastrar</title>
<style>
body { background: #0B1F1C; color: #F2EEE3; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: #112B26; border: 1px solid #1E3D36; border-radius: 20px; padding: 36px 32px; max-width: 440px; width: 100%; }
.auth-title { font-size: 25px; font-weight: 600; margin-bottom: 8px; }
.auth-sub { font-size: 13.5px; color: #9FB3AC; margin-bottom: 26px; }
.field-label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #5E7770; font-weight: 600; margin-bottom: 7px; display: block; }
.field-input { width: 100%; background: #0B1F1C; border: 1px solid #2A5048; border-radius: 10px; padding: 12px 14px; color: #F2EEE3; font-size: 14.5px; outline: none; margin-bottom: 16px; }
.field-input:focus { border-color: #E8A33D; }
.btn-submit { width: 100%; padding: 13px; border-radius: 100px; background: #E8A33D; color: #1A1306; font-weight: 700; font-size: 14.5px; border: none; cursor: pointer; transition: all .25s; }
.btn-submit:hover { background: #F0B25A; transform: translateY(-1px); box-shadow: 0 8px 20px -6px rgba(232, 163, 61, .45); }
</style>
</head>
<body>

<div class="auth-card">
  <h1 class="auth-title">Bem-vindo</h1>
  <p class="auth-sub">Entre para acessar sua conta Crivo.</p>

  <div class="field-group">
    <label class="field-label">E-mail</label>
    <input class="field-input" type="email" placeholder="seu@email.com" required>
  </div>

  <div class="field-group">
    <label class="field-label">Senha</label>
    <input class="field-input" type="password" placeholder="••••••••" required>
  </div>

  <button class="btn-submit">Entrar</button>
</div>

</body>
</html>
