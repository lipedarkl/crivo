<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crivo — Entrar ou Cadastrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0B1F1C;--bg-surface:#112B26;--bg-surf2:#163831;
  --ink:#F2EEE3;--ink2:#9FB3AC;--ink3:#5E7770;
  --amber:#E8A33D;--amber-soft:#E8A33D1A;--coral:#E8633D;
  --line:#1E3D36;--line2:#2A5048;
  --ff:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;--fd:'Fraunces',serif;
  --r:14px;--rp:100px;--ease:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg-deep);color:var(--ink);font-family:var(--ff);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 15% 15%, rgba(232,163,61,.05) 0%, transparent 45%),
                    radial-gradient(circle at 85% 85%, rgba(232,99,61,.04) 0%, transparent 40%);
  pointer-events:none;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.top-logo{position:absolute;top:32px;left:32px;display:flex;align-items:center;gap:9px;font-family:var(--fd);font-size:19px;font-weight:600;z-index:2}
.top-logo svg{width:26px;height:26px}
.back-home{position:absolute;top:36px;right:32px;font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:6px;z-index:2;transition:color .2s}
.back-home:hover{color:var(--amber)}
.back-home svg{width:13px;height:13px}

.auth-wrap{width:100%;max-width:440px;position:relative;z-index:1}

.auth-card{background:var(--bg-surface);border:1px solid var(--line);border-radius:20px;padding:36px 32px}
.auth-eyebrow{font-family:var(--fm);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.auth-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--amber)}
.auth-title{font-family:var(--fd);font-size:25px;font-weight:600;margin-bottom:8px}
.auth-sub{font-size:13.5px;color:var(--ink2);margin-bottom:26px;line-height:1.55}

.field-group{margin-bottom:20px}
.field-label{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);font-weight:600;margin-bottom:7px;display:block}
.field-input{width:100%;background:var(--bg-deep);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;color:var(--ink);font-family:var(--ff);font-size:14.5px;outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--amber)}
.field-input::placeholder{color:var(--ink3)}

.btn-submit{width:100%;padding:13px;border-radius:var(--rp);background:var(--amber);color:#1A1306;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s var(--ease);margin-top:6px}
.btn-submit:hover{background:#F0B25A;transform:translateY(-1px);box-shadow:0 8px 20px -6px rgba(232,163,61,.45)}
.btn-submit svg{width:16px;height:16px}

.terms-note{font-size:12px;color:var(--ink3);text-align:center;margin-top:18px;line-height:1.5}

@media (max-width:480px){
  .auth-card{padding:28px 22px}
  .top-logo{position:static;margin-bottom:24px;justify-content:center}
  .back-home{display:none}
  body{align-items:flex-start;padding-top:32px}
}
</style>
</head>
<body>

<a href="index.html" class="top-logo">
  <svg viewBox="0 0 30 30" fill="none"><rect x="2" y="2" width="26" height="26" rx="7" fill="#112B26" stroke="#E8A33D" stroke-width="1.5"/><path d="M9 15.5L13 19.5L21 10.5" stroke="#E8A33D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Crivo
</a>
<a href="index.html" class="back-home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Voltar ao site
</a>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow">Acesso de empresa</div>
    <h1 class="auth-title">Bem-vinda de volta</h1>
    <p class="auth-sub">Entre para acompanhar seus relatórios e conversar com seu economista.</p>

    <form id="loginForm">
      <div class="field-group">
        <label class="field-label">E-mail</label>
        <input class="field-input" type="email" id="loginEmail" placeholder="voce@empresa.com" required>
      </div>
      <div class="field-group">
        <label class="field-label">Senha</label>
        <input class="field-input" type="password" id="loginPass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">
        <span>Entrar</span>
      </button>
    </form>

    <p class="terms-note">Esta é uma demonstração. Qualquer e-mail e senha entram.</p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  alert('Login simulado! Bem-vindo ao Crivo.');
});
</script>
</body>
</html>
